<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaverilista</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Kaverilista</h1>
    <div class="version-selector">
        <button id="show-version1" class="active">Versio 1:</button>
        <button id="show-version2">Versio 2:</button>
    </div>

    <div id="version1" class="version active">
        <h2>Versio 1:</h2>
        <div>
            <p id="question1">Anna kaverin nimi:</p>
            <input type="text" id="name-input1" placeholder="Syötä nimi">
            <button id="add-button1">Lisää</button>
        </div>
        <div>
            <h3>Kaverilista:</h3>
            <ul id="names-list1"></ul>
        </div>
    </div>

    <div id="version2" class="version">
        <h2>Versio 2:</h2>
        <div>
            <input type="text" id="name-input2" placeholder="Syötä nimi">
            <button id="add-button2">Lisää</button>
        </div>
        <div>
            <button id="sort-asc">Järjestä Kaverit</button>
            
        </div>
        <div>
            <h3>Kaverilista:</h3>
            <ul id="names-list2"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
